#http
services:
  app:
    image: ghcr.io/mahn-ke/rcon-by-vincent:latest
    restart: on-failure:5
    environment:
      - RCON_SERVER=${RCON_SERVER}
      - RCON_PASSWORD=${RCON_PASSWORD}
      - ALLOWLIST_SECRET=${ALLOWLIST_SECRET}
      - PORT=3000
    ports:
      - "3016:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
